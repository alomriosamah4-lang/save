name: Android Native Build (multi-ABI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-native:
    name: Build Android (assembleDebug)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install required packages
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip git python3-pip

      - name: Install Gradle (system) to generate wrapper if missing
        run: |
          sudo apt-get install -y gradle

      - name: Install Android commandline tools and SDK packages
        env:
          ANDROID_SDK_ROOT: ${{ runner.tool_cache }}/android-sdk
        run: |
          set -e
          export ANDROID_SDK_ROOT=${{ runner.tool_cache }}/android-sdk
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd $ANDROID_SDK_ROOT/cmdline-tools
          if [ ! -d "latest" ]; then
            wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
            unzip cmdline-tools.zip -d tmp
            mkdir -p latest
            mv tmp/cmdline-tools/* latest/ || true
            rm -rf tmp cmdline-tools.zip
          fi
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses || true
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-34" "build-tools;34.0.0" "cmake;3.22.1" "ndk;25.2.9519653"

      - name: Export Android env vars
        run: |
          echo "ANDROID_SDK_ROOT=${{ runner.tool_cache }}/android-sdk" >> $GITHUB_ENV
          echo "PATH=${{ runner.tool_cache }}/android-sdk/cmdline-tools/latest/bin:${{ runner.tool_cache }}/android-sdk/platform-tools:$PATH" >> $GITHUB_ENV

      - name: Show Java/Gradle versions
        run: |
          java -version
          gradle -version

      - name: Generate Gradle wrapper if missing
        working-directory: android
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper
          fi

      - name: Make gradlew executable
        run: |
          chmod +x android/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Accept Android SDK licenses
        env:
          ANDROID_HOME: ${{ runner.tool_cache }}/android-sdk
        run: |
          mkdir -p $ANDROID_HOME
          sdkmanager --licenses || true

      - name: Build (assembleDebug)
        working-directory: android
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apks
          path: |
            android/app/build/outputs/**/*.apk
